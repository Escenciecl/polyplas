<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Polyplas · Panel de Atención</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    background: #f3f4f6;
    color: #1f2937;
    height: 100vh;
    overflow: hidden;
  }

  /* Login */
  #login {
    position: fixed; inset: 0; background: #0a4d3c;
    display: flex; align-items: center; justify-content: center;
    z-index: 100;
  }
  #login .box {
    background: white; padding: 40px; border-radius: 16px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.2);
    width: 360px; text-align: center;
  }
  #login h1 { color: #0a4d3c; margin-bottom: 6px; }
  #login p { color: #6b7280; font-size: 13px; margin-bottom: 24px; }
  #login input {
    width: 100%; padding: 12px; border: 1px solid #d1d5db;
    border-radius: 8px; font-size: 14px; margin-bottom: 12px;
  }
  #login button {
    width: 100%; padding: 12px; background: #0a4d3c; color: white;
    border: none; border-radius: 8px; font-size: 14px; font-weight: 600;
    cursor: pointer;
  }

  /* App layout */
  #app { display: none; height: 100vh; }
  #app.active { display: flex; }

  /* Sidebar */
  #sidebar {
    width: 340px; background: white; border-right: 1px solid #e5e7eb;
    display: flex; flex-direction: column;
  }
  #sidebar-header {
    padding: 20px; border-bottom: 1px solid #e5e7eb;
    background: linear-gradient(135deg, #0a4d3c 0%, #0d6e54 100%);
    color: white;
  }
  #sidebar-header h1 { font-size: 18px; margin-bottom: 2px; }
  #sidebar-header p { font-size: 12px; opacity: 0.85; }
  .stats {
    display: flex; gap: 8px; margin-top: 12px;
  }
  .stat {
    flex: 1; background: rgba(255,255,255,0.15); padding: 8px;
    border-radius: 8px; text-align: center; font-size: 11px;
  }
  .stat strong { display: block; font-size: 18px; margin-bottom: 2px; }

  #conversations { flex: 1; overflow-y: auto; }
  .conv-item {
    padding: 14px 16px; border-bottom: 1px solid #f3f4f6;
    cursor: pointer; display: flex; gap: 12px; align-items: flex-start;
    transition: background 0.1s;
  }
  .conv-item:hover { background: #f9fafb; }
  .conv-item.active { background: #ecfdf5; border-left: 3px solid #0a4d3c; padding-left: 13px; }
  .conv-avatar {
    width: 40px; height: 40px; border-radius: 50%;
    background: #0a4d3c; color: white;
    display: flex; align-items: center; justify-content: center;
    font-weight: 600; font-size: 14px; flex-shrink: 0;
  }
  .conv-info { flex: 1; min-width: 0; }
  .conv-name {
    font-weight: 600; font-size: 14px; color: #111827;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .conv-company { font-size: 11px; color: #6b7280; }
  .conv-time { font-size: 11px; color: #9ca3af; margin-top: 2px; }
  .conv-badge {
    background: #ef4444; color: white; font-size: 10px; font-weight: 700;
    padding: 2px 7px; border-radius: 10px; margin-left: auto;
  }

  /* Main chat */
  #main {
    flex: 1; display: flex; flex-direction: column; background: #f9fafb;
  }
  #empty-state {
    flex: 1; display: flex; align-items: center; justify-content: center;
    flex-direction: column; color: #9ca3af; font-size: 14px;
  }
  #empty-state svg { width: 80px; height: 80px; margin-bottom: 16px; opacity: 0.4; }

  #chat-view { display: none; flex-direction: column; flex: 1; }
  #chat-view.active { display: flex; }

  #chat-header {
    background: white; padding: 16px 24px; border-bottom: 1px solid #e5e7eb;
    display: flex; gap: 14px; align-items: center;
  }
  #chat-header .avatar {
    width: 44px; height: 44px; border-radius: 50%;
    background: #0a4d3c; color: white;
    display: flex; align-items: center; justify-content: center; font-weight: 600;
  }
  #chat-header .name { font-weight: 600; font-size: 15px; }
  #chat-header .meta { font-size: 12px; color: #6b7280; margin-top: 2px; }
  #chat-header .meta a { color: #0a4d3c; text-decoration: none; margin-right: 12px; }
  #chat-header .meta a:hover { text-decoration: underline; }

  #chat-messages {
    flex: 1; overflow-y: auto; padding: 24px;
    display: flex; flex-direction: column; gap: 12px;
  }
  .msg {
    max-width: 60%; padding: 10px 14px; border-radius: 14px;
    font-size: 14px; line-height: 1.4; word-wrap: break-word;
  }
  .msg.client { align-self: flex-start; background: white; box-shadow: 0 1px 2px rgba(0,0,0,0.05); border-bottom-left-radius: 4px; }
  .msg.agent { align-self: flex-end; background: #0a4d3c; color: white; border-bottom-right-radius: 4px; }
  .msg .time { display: block; font-size: 10px; opacity: 0.7; margin-top: 4px; }

  #chat-input-area {
    background: white; padding: 16px 24px; border-top: 1px solid #e5e7eb;
    display: flex; gap: 10px;
  }
  #chat-input {
    flex: 1; padding: 12px 16px; border: 1px solid #d1d5db;
    border-radius: 999px; font-size: 14px; outline: none;
    font-family: inherit;
  }
  #chat-input:focus { border-color: #0a4d3c; }
  #chat-send {
    background: #0a4d3c; color: white; border: none; padding: 0 24px;
    border-radius: 999px; cursor: pointer; font-weight: 600; font-size: 14px;
  }
  #chat-send:hover { background: #083d30; }

  .empty-conv { padding: 40px 20px; text-align: center; color: #9ca3af; font-size: 13px; }

  /* Notification badge in tab title is handled by JS */
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login">
  <div class="box">
    <h1>Polyplas</h1>
    <p>Panel de atención al cliente</p>
    <input type="password" id="pwd" placeholder="Contraseña" onkeydown="if(event.key==='Enter') doLogin()" />
    <button onclick="doLogin()">Ingresar</button>
  </div>
</div>

<!-- APP -->
<div id="app">
  <aside id="sidebar">
    <div id="sidebar-header">
      <h1>👋 Hola Maca</h1>
      <p>Panel de atención · Polyplas</p>
      <div class="stats">
        <div class="stat"><strong id="stat-total">0</strong>Activas</div>
        <div class="stat"><strong id="stat-unread">0</strong>Sin leer</div>
      </div>
    </div>
    <div id="conversations">
      <div class="empty-conv">Cargando conversaciones…</div>
    </div>
  </aside>

  <main id="main">
    <div id="empty-state">
      <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"/></svg>
      <p>Selecciona una conversación para empezar</p>
    </div>
    <div id="chat-view">
      <div id="chat-header">
        <div class="avatar" id="ch-avatar">?</div>
        <div>
          <div class="name" id="ch-name">—</div>
          <div class="meta" id="ch-meta">—</div>
        </div>
      </div>
      <div id="chat-messages"></div>
      <div id="chat-input-area">
        <input type="text" id="chat-input" placeholder="Escribe tu respuesta..." onkeydown="if(event.key==='Enter') sendReply()" />
        <button id="chat-send" onclick="sendReply()">Enviar</button>
      </div>
    </div>
  </main>
</div>

<!-- Audio para notificación -->
<audio id="ding" preload="auto">
  <source src="data:audio/mp3;base64,SUQzBAAAAAAAI1RTU0UAAAAPAAADTGF2ZjU4Ljc2LjEwMAAAAAAAAAAAAAAA//tQwAADB" type="audio/mp3">
</audio>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  // ===== CONFIG =====
  const SUPABASE_URL = 'https://gdrkscedvkjtcvexnhzg.supabase.co';
  const SUPABASE_ANON_KEY = 'sb_publishable_qT9WuJK5Wi6VghgMvcYIMw_IGBtn1Tc';
  const PASSWORD = 'maca2026'; // CAMBIA ESTO. Es una capa simple, no es seguridad real.
  // ==================

  const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
  let currentConvId = null;
  let conversations = [];
  let titleBlinker = null;
  const originalTitle = document.title;

  function doLogin() {
    if (document.getElementById('pwd').value === PASSWORD) {
      sessionStorage.setItem('pp_logged', '1');
      showApp();
    } else {
      alert('Contraseña incorrecta');
    }
  }
  if (sessionStorage.getItem('pp_logged') === '1') showApp();

  function showApp() {
    document.getElementById('login').style.display = 'none';
    document.getElementById('app').classList.add('active');
    loadConversations();
    subscribeAll();
  }

  async function loadConversations() {
    const { data, error } = await supabase.from('conversations')
      .select('*').order('last_message_at', { ascending: false });
    if (error) { console.error(error); return; }
    conversations = data || [];
    renderConversations();
  }

  function renderConversations() {
    const list = document.getElementById('conversations');
    if (!conversations.length) {
      list.innerHTML = '<div class="empty-conv">Aún no hay conversaciones</div>';
      document.getElementById('stat-total').textContent = '0';
      document.getElementById('stat-unread').textContent = '0';
      return;
    }
    let unread = 0;
    list.innerHTML = conversations.map(c => {
      if (c.unread_count > 0) unread++;
      const initial = (c.client_name || '?')[0].toUpperCase();
      const time = timeAgo(c.last_message_at);
      return `
        <div class="conv-item ${c.id === currentConvId ? 'active' : ''}" onclick="openConversation('${c.id}')">
          <div class="conv-avatar">${initial}</div>
          <div class="conv-info">
            <div class="conv-name">${escapeHtml(c.client_name || 'Sin nombre')}</div>
            <div class="conv-company">${escapeHtml(c.client_company || c.client_email || '')}</div>
            <div class="conv-time">${time}</div>
          </div>
          ${c.unread_count > 0 ? `<span class="conv-badge">${c.unread_count}</span>` : ''}
        </div>`;
    }).join('');
    document.getElementById('stat-total').textContent = conversations.length;
    document.getElementById('stat-unread').textContent = unread;
    updateTabBadge(unread);
  }

  async function openConversation(id) {
    currentConvId = id;
    const conv = conversations.find(c => c.id === id);
    if (!conv) return;

    document.getElementById('empty-state').style.display = 'none';
    document.getElementById('chat-view').classList.add('active');
    document.getElementById('ch-avatar').textContent = (conv.client_name || '?')[0].toUpperCase();
    document.getElementById('ch-name').textContent = conv.client_name || 'Sin nombre';
    const meta = [];
    if (conv.client_company) meta.push(escapeHtml(conv.client_company));
    if (conv.client_email) meta.push(`<a href="mailto:${conv.client_email}">${escapeHtml(conv.client_email)}</a>`);
    if (conv.client_phone) meta.push(`<a href="tel:${conv.client_phone}">${escapeHtml(conv.client_phone)}</a>`);
    document.getElementById('ch-meta').innerHTML = meta.join(' · ') || '—';

    // Cargar mensajes
    const { data: msgs } = await supabase.from('messages')
      .select('*').eq('conversation_id', id).order('created_at');
    const container = document.getElementById('chat-messages');
    container.innerHTML = '';
    (msgs || []).forEach(renderMsg);
    container.scrollTop = container.scrollHeight;

    // Marcar como leídas
    await supabase.from('conversations').update({ unread_count: 0 }).eq('id', id);
    conv.unread_count = 0;
    renderConversations();
  }

  function renderMsg(m) {
    const container = document.getElementById('chat-messages');
    const div = document.createElement('div');
    div.className = 'msg ' + m.sender;
    const time = new Date(m.created_at).toLocaleTimeString('es-CL', {hour:'2-digit', minute:'2-digit'});
    div.innerHTML = `${escapeHtml(m.content)}<span class="time">${time}</span>`;
    container.appendChild(div);
    container.scrollTop = container.scrollHeight;
  }

  async function sendReply() {
    const input = document.getElementById('chat-input');
    const text = input.value.trim();
    if (!text || !currentConvId) return;
    input.value = '';

    renderMsg({ sender: 'agent', content: text, created_at: new Date().toISOString() });

    await supabase.from('messages').insert({
      conversation_id: currentConvId, sender: 'agent', content: text
    });
    await supabase.from('conversations').update({
      last_message_at: new Date().toISOString()
    }).eq('id', currentConvId);
  }

  function subscribeAll() {
    // Nuevos mensajes
    supabase.channel('all-msgs')
      .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'messages' }, payload => {
        const m = payload.new;
        if (m.sender === 'client') {
          // Si la conversación está abierta, mostrar mensaje
          if (m.conversation_id === currentConvId) {
            renderMsg(m);
            // Marcar leídos
            supabase.from('conversations').update({ unread_count: 0 }).eq('id', currentConvId);
          } else {
            // Notificación
            playDing();
            notifyDesktop(m.content);
          }
          loadConversations();
        }
      }).subscribe();

    // Nuevas conversaciones
    supabase.channel('all-convs')
      .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'conversations' }, () => {
        playDing();
        loadConversations();
      })
      .on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'conversations' }, () => {
        loadConversations();
      }).subscribe();

    // Pedir permiso de notificaciones
    if ('Notification' in window && Notification.permission === 'default') {
      Notification.requestPermission();
    }
  }

  function playDing() {
    // Genera un beep simple con WebAudio
    try {
      const ctx = new (window.AudioContext || window.webkitAudioContext)();
      const o = ctx.createOscillator(); const g = ctx.createGain();
      o.connect(g); g.connect(ctx.destination);
      o.frequency.value = 880; g.gain.value = 0.1;
      o.start(); o.stop(ctx.currentTime + 0.15);
    } catch(e) {}
  }

  function notifyDesktop(text) {
    if ('Notification' in window && Notification.permission === 'granted') {
      new Notification('Nuevo mensaje · Polyplas', { body: text.slice(0, 80) });
    }
    // Parpadear título de la pestaña
    if (!titleBlinker) {
      let toggle = false;
      titleBlinker = setInterval(() => {
        document.title = toggle ? originalTitle : '🔴 Nuevo mensaje · Polyplas';
        toggle = !toggle;
      }, 1000);
    }
  }
  window.addEventListener('focus', () => {
    if (titleBlinker) { clearInterval(titleBlinker); titleBlinker = null; document.title = originalTitle; }
  });

  function updateTabBadge(unread) {
    if (unread > 0 && !document.hasFocus()) {
      // ya manejado por blinker
    }
  }

  function timeAgo(date) {
    const d = (Date.now() - new Date(date)) / 1000;
    if (d < 60) return 'Ahora';
    if (d < 3600) return Math.floor(d/60) + ' min';
    if (d < 86400) return Math.floor(d/3600) + ' h';
    return Math.floor(d/86400) + ' d';
  }

  function escapeHtml(s) {
    if (!s) return '';
    return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }
</script>
</body>
</html>
